server {
    listen 80;
    server_name lagouttedor.agartha.cc;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lagouttedor.agartha.cc;

    # Certificats SSL (chemin à adapter selon ton setup, ex: Certbot)
    ssl_certificate /etc/letsencrypt/live/lagouttedor.agartha.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lagouttedor.agartha.cc/privkey.pem;

    # Paramètres SSL recommandés
    include /etc/letsencrypt/options-ssl-nginx.conf;  # si présent avec Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;    # si présent avec Certbot

    location / {
        proxy_pass http://127.0.0.1:3050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploads et assets statiques
    location /uploads {
        proxy_pass http://127.0.0.1:3000;
    }
}
